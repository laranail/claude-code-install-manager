version: 2

updates:
  # GitHub Actions used in this repo's workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions

  # Catches updates to the workflow files under .github/workflows/.
  - package-ecosystem: github-actions
    directory: /.github/workflows
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
